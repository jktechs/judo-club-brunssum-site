name: Build and Push Container

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Secrets are Loaded
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "❌ DOCKERHUB_USERNAME secret is NOT set."
          else
            echo "✅ DOCKERHUB_USERNAME secret is set."
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "❌ DOCKERHUB_TOKEN secret is NOT set."
          else
            echo "✅ DOCKERHUB_TOKEN secret is set."
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create global.ts from Secret
        env:
          SECRET_CONTENTS: ${{ secrets.GLOBAL_TS }}
        run: echo "$SECRET_CONTENTS" > global.ts

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm/v7
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/judo-club-brunssum-site:latest,${{ secrets.DOCKERHUB_USERNAME }}/judo-club-brunssum-site:${{ github.sha }}
