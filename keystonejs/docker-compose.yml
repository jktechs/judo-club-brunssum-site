services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development # production
      - HOST=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_TELEMETRY_DEBUG=1
    volumes:
      - ./app:/app
      - /app/node_modules  # ensures container node_modules don't overwrite local
    command: npm run dev # sleep infinity # npm run dev
